<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Joc Mastermind</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="contenidor">
    <h1>Joc Mastermind</h1>
    <p>Introdueix un codi de 4 digits</p>

    <div class="info-de-les-rondes">
      <span>Rondes restants:</span>
      <strong id="roundsLeft">5</strong>
    </div>

    <div class="selectors">
      <select class="digit-select"></select>
      <select class="digit-select"></select>
      <select class="digit-select"></select>
      <select class="digit-select"></select>
      <!--esto son los espacios de digitos que hay-->
    </div>

    <div class="botons">
      <button id="checkButton" type="button">Comprovar codi</button>
    </div>

    <div class="terminal" id="terminal">
    <!--esta linia es para poder decorar la terminal en el css, i para que me mumestre mensajes tipo "intento incorrecto"-->
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
